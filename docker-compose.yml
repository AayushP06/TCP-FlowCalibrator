version: '3.8'

services:
  target_server:
    image: nginx:alpine
    container_name: target_server
    networks:
      - simulation_net

  attacker:
    image: kalilinux/kali-rolling
    container_name: kali_attacker
    # This command keeps the Kali container running in the background
    command: tail -f /dev/null 
    networks:
      - simulation_net

networks:
  simulation_net:
    driver: bridge